
<!DOCTYPE html>
<html lang="pt-PT" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Real Frio - Gestão Técnica</title>
    
    <link rel="icon" type="image/png" href="/rf-favicon-v5.png">
    <link rel="shortcut icon" type="image/png" href="/rf-favicon-v5.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/rf-apple-v5.png">

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#9d1c24">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Real Frio">

    <!-- Leaflet Maps CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.height = '100%';
        div.style.backgroundColor = 'white';
        div.style.color = 'red';
        div.style.padding = '20px';
        div.style.zIndex = '9999';
        div.style.overflow = 'auto';
        div.style.fontFamily = 'monospace';
        div.innerHTML = '<h1>Runtime Error</h1>' +
          '<p><strong>Message:</strong> ' + msg + '</p>' +
          '<p><strong>URL:</strong> ' + url + '</p>' +
          '<p><strong>Line:</strong> ' + lineNo + '</p>' +
          '<p><strong>Column:</strong> ' + columnNo + '</p>' +
          '<pre>' + (error && error.stack ? error.stack : 'No stack trace available') + '</pre>';
        document.body.appendChild(div);
        return false;
      };

      window.onunhandledrejection = function(event) {
        var msg = event.reason && event.reason.message ? event.reason.message : String(event.reason);
        if (msg === 'Failed to fetch' || msg.includes('network error')) {
            console.warn("Conexão interrompida. Verifique o estado do servidor Supabase ou a sua internet.");
        }
        // Não mostrar o overlay vermelho para Failed to fetch, pois pode ser intermitente
        // mas logar no console
        console.error("Promessa Rejeitada Não Tratada:", event.reason);
      };
    </script>
    <script>
      // Shim para evitar erros em ambientes que esperam process.env
      window.process = window.process || { env: {} };
    </script>
</head>
  <body class="h-full overflow-hidden">
    <div id="root" class="h-full"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Atualizado para v10.6 para forçar cache refresh e nova lógica de ativação
          navigator.serviceWorker.register('/sw.js?v=10.6')
            .then(registration => {
              console.log('SW v10.6 Active');
            }).catch(err => {
              console.log('SW registration failed', err);
            });
        });
      }
    </script>
  </body>
</html>
